name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Typecheck / Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm install && npm run build

      - name: Package plugin zip
        run: zip -j toggl-sync-plugin.zip manifest.json dist/plugin.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: toggl-sync-plugin
          path: toggl-sync-plugin.zip
          retention-days: 7
